services:
  postgres:
    image: ${POSTGRES_IMAGE}
    container_name: engram-cloud-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "0.0.0.0:5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U engram -d engram_cloud" ]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - engram-cloud-pg:/var/lib/postgresql/data

  cloud:
    build:
      context: .
      dockerfile: docker/cloud/Dockerfile
    container_name: engram-cloud
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENGRAM_DATABASE_URL: ${ENGRAM_DATABASE_URL}
      ENGRAM_JWT_SECRET: ${ENGRAM_JWT_SECRET}
      ENGRAM_CLOUD_ALLOWED_PROJECTS: ${ENGRAM_CLOUD_ALLOWED_PROJECTS}
      ENGRAM_CLOUD_HOST: ${ENGRAM_CLOUD_HOST}
      ENGRAM_PORT: ${ENGRAM_PORT}
      ENGRAM_CLOUD_ADMIN: ${ENGRAM_CLOUD_ADMIN}
      ENGRAM_CLOUD_TOKEN: ${ENGRAM_CLOUD_TOKEN}
    ports:
      - "0.0.0.0:${ENGRAM_PORT}:${ENGRAM_PORT}"
    command: [ "cloud", "serve" ]

volumes:
  engram-cloud-pg:
